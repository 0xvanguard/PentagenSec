apiVersion: 1
contactPoints:
  - orgId: 1
    name: Slack-SOC
    receivers:
      - uid: slack-soc
        type: slack
        settings:
          url: https://hooks.slack.com/services/T000/B000/XXXX
          title: "{{.Status | toUpper }} {{.CommonLabels.alertname }}"
          text: "{{.CommonAnnotations.summary }}\n{{.CommonAnnotations.description }}"

policies:
  - orgId: 1
    receiver: Slack-SOC
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
