global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
    - job_name: 'antigravity'
      static_configs:
            - targets: ['host.docker.internal:9091'] # Mac/Win
        # - targets: ['172.17.0.1:9091'] # Linux, ajusta IP
      scrape_interval: 5s

    - job_name: 'neo4j'
      static_configs:
            - targets: ['neo4j:2004'] # Si activas metrics plugin

    - job_name: 'kafka'
      static_configs:
            - targets: ['kafka:9308'] # Si usas JMX exporter
