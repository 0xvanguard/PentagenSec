# =============================================================================
#  VANGUARD-X Blue Team — Defensive multi-agent SecOps stack
#  -----------------------------------------------------------------------------
#  Two services on an isolated bridge network.
#
#    1. ollama-service   -> hosts qwen2.5-coder:7b locally, auto-pulls on
#                           first boot, exposes the OpenAI-compatible /v1
#                           endpoint. Healthcheck only flips green when the
#                           model is loaded.
#    2. blueteam-agents  -> runs the 5 defensive agents + HumanApprovalAgent
#                           gate. Starts only when ollama-service is healthy.
#                           Reads SIEM/EDR data we already own — never reaches
#                           out to a third-party target.
#
#  Single-command bring-up:  docker compose up --build
#
#  Hard policy: no external network targeting without written authorization.
# =============================================================================

name: vanguard-x-blueteam

services:
  # ---------------------------------------------------------------------------
  # 1) Local LLM runtime
  # ---------------------------------------------------------------------------
  ollama-service:
    image: ollama/ollama:latest
    container_name: vanguard-ollama
    hostname: ollama-service
    restart: unless-stopped
    ports:
      # Exposed for host-side debugging only. Remove in hardened deployments.
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - blueteam-net
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
    # AC-17: Sin pull automático. Falla si no hay modelo local.
    entrypoint: >
      sh -c "ollama serve &
      sleep 2 &&
      if ! ollama list | grep -q $${OLLAMA_MODEL:-qwen2.5-coder:7b}; then
        echo 'ERROR AC-17: Modelo no encontrado. Modo air-gap requiere pre-carga.' >&2;
        echo 'Ejecuta en máquina con internet: ollama pull $${OLLAMA_MODEL:-qwen2.5-coder:7b}' >&2;
        echo 'Luego: docker save ollama/ollama | gzip > ollama.tar.gz' >&2;
        exit 1;
      fi;
      tail -f /dev/null"
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'qwen2.5-coder:7b' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60          # 60 * 15s = up to 15 min grace for first-time pull
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 2) Blue Team multi-agent pipeline + Human approval gate
  # ---------------------------------------------------------------------------
  blueteam-agents:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanguard-x/blueteam-agents:latest
    container_name: vanguard-blueteam
    hostname: blueteam-agents
    depends_on:
      ollama-service:
        condition: service_healthy
    networks:
      - blueteam-net
    environment:
      OLLAMA_BASE_URL: "http://ollama-service:11434/v1"
      OLLAMA_MODEL: "qwen2.5-coder:7b"
      OLLAMA_API_KEY: "ollama-local-noop"
      LOG_LEVEL: "INFO"
      MAX_AGENT_TURNS: "18"
      REQUEST_TIMEOUT_S: "240"
      SIEM_EVENTS_PATH: "/home/secops/app/sample_data/siem_events.json"
      # Mandatory human approval gate — see main.py for policy enforcement.
      HUMAN_APPROVAL_MODE: "${HUMAN_APPROVAL_MODE:-interactive}"
      HUMAN_APPROVAL_TIMEOUT_S: "${HUMAN_APPROVAL_TIMEOUT_S:-600}"
      # Notification channels (post-approval only). Empty = disabled.
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID:   "${TELEGRAM_CHAT_ID:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
    volumes:
      # SIEM events we already own (read-only — defensive posture).
      - ./sample_data:/home/secops/app/sample_data:ro
      # Persisted reports written by the ComplianceAgent.
      - ./reports:/home/secops/app/reports
    # stdin_open + tty are required so the HumanApprovalAgent can read
    # operator decisions from the attached terminal.
    stdin_open: true
    tty: true
    # Hardening — runs the workload with reduced kernel privileges.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: "no"

  # --- v3.2 Neo4j Graph ---
  neo4j:
    image: neo4j:latest
    container_name: pentagensec-neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt driver
    environment:
      - NEO4J_AUTH=neo4j/pentagensec  # CAMBIAR EN PROD
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - blueteam-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "pentagensec", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- v3.4 Kafka Streaming ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: pentagensec-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_logs:/var/lib/zookeeper/log
    networks:
      - blueteam-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: pentagensec-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - blueteam-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Utilidad: crear topic siem_raw al inicio ---
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic siem_raw --partitions 3 --replication-factor 1 &&
       echo 'Topic siem_raw ready'"
    networks:
      - blueteam-net

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - blueteam-net

  ebpf-builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE]
    network_mode: "none"
    volumes:
      - ebpf_artifacts:/out
    security_opt:
      - no-new-privileges:true

  xdp-filter:
    build:
      context: .
      dockerfile: Dockerfile.xdp
    container_name: pentagensec-xdp
    network_mode: "host" # XDP necesita acceso a NIC host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    volumes:
      - ./rules:/app/rules
      - ./ebpf:/app/ebpf
      - /sys/fs/bpf:/sys/fs/bpf
      - /lib/modules:/lib/modules:ro
      - ebpf_artifacts:/out:ro
    command: python3 main.py --xdp --iface eth0
    restart: unless-stopped

  # --- Día 4: Observabilidad ---
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pentagensec-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - blueteam-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pentagensec-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=pentagensec
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana-provisioning:/etc/grafana/provisioning
    networks:
      - blueteam-net
    depends_on:
      - prometheus

# -----------------------------------------------------------------------------
# Network / Volumes
# -----------------------------------------------------------------------------
networks:
  blueteam-net:
    driver: bridge
    name: vanguard-blueteam-net

volumes:
  ollama_models:
    name: vanguard-ollama-models
    # Named volume keeps the ~4.7 GB model across rebuilds — pulled only once.

  neo4j_data:
  neo4j_logs:
  zk_data:
  zk_logs:
  kafka_data:
  prometheus_data:
  grafana_data:
  minio_data:
