
#  VANGUARD-X Blue Team — Defensive multi-agent SecOps stack
#  -----------------------------------------------------------------------------
#  Two services on an isolated bridge network.
#
#    1. ollama-service   -> hosts qwen2.5-coder:7b locally, auto-pulls on
#                           first boot, exposes the OpenAI-compatible /v1
#                           endpoint. Healthcheck only flips green when the
#                           model is loaded.
#    2. blueteam-agents  -> runs the 5 defensive agents + HumanApprovalAgent
#                           gate. Starts only when ollama-service is healthy.
#                           Reads SIEM/EDR data we already own — never reaches
#                           out to a third-party target.
#    3. ebpf-builder     -> compiles pentagensec.bpf.o artifact cleanly
#
#  Single-command bring-up:  docker compose up --build
#
#  Hard policy: no external network targeting without written authorization.
# =============================================================================

name: vanguard-x-blueteam

services:
  # ---------------------------------------------------------------------------
  # 1) Local LLM runtime
  # ---------------------------------------------------------------------------
  ollama-service:
    image: ollama/ollama:latest
    container_name: vanguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 2) eBPF builder - compiles clean artifacts
  # ---------------------------------------------------------------------------
  ebpf-builder:
    build:
      context: ./ebpf
      dockerfile: Dockerfile
    container_name: vanguard-ebpf-builder
    volumes:
      - ebpf_artifacts:/artifacts
      - ./ebpf:/src:ro
    command: ["make", "clean", "all"]

  # ---------------------------------------------------------------------------
  # 3) Blue Team agents + HumanApprovalAgent
  # ---------------------------------------------------------------------------
  blueteam-agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vanguard-blueteam
    depends_on:
      ollama-service:
        condition: service_healthy
      ebpf-builder:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./sample_data:/app/sample_data:ro
      - ./reports:/app/reports
      - ebpf_artifacts:/app/ebpf:ro
    env_file:
      - .env
    restart: unless-stopped

volumes:
  ollama_models:
  ebpf_artifacts:
